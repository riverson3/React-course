<!DOCTYPE html>
<html>

<head>
    <title>React Basics</title>
</head>

<body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
        function Input({ setResponse }) {
            const [inputWins, setInputWins] = React.useState();
            const [inputDraws, setInputDraws] = React.useState();
            const [inputLoss, setInputLoss] = React.useState();

            function saveWins(event) {
                setInputWins(event.target.value);
            }

            function saveDraws(event) {
                setInputDraws(event.target.value);
            }

            function saveLoss(event) {
                setInputLoss(event.target.value);
            }

            function calculatePoints() {
                setResponse('Jou team heeft ' + (Number(inputWins) * 3 + Number(inputDraws) * 1 + Number(inputLoss) * 0) + ' punten');
            }

            function reset() {
                setInputDraws('');
                setInputLoss('');
                setInputWins('');
                setResponse('Give something to calculate! ');
            }

            function handleKeyDown(event) {
                if (event.key === 'Enter') {
                    calculatePoints();
                } else if (event.key === 'Backspace') {
                    reset();
                }
            }


            return (
                <>
                    <input value={inputWins} onChange={saveWins} onKeyDown={handleKeyDown} placeholder="Wins" />
                    <input value={inputDraws} onChange={saveDraws} onKeyDown={handleKeyDown} placeholder="Draws" />
                    <input value={inputLoss} onChange={saveLoss} onKeyDown={handleKeyDown} placeholder="Losses" />
                    <button onClick={calculatePoints}>Compare</button>
                    <button onClick={reset}>Reset</button>
                </>
            );
        }


        function Response({ response }) {
            return (
                <p> {response} </p>
            );
        }

        function App() {
            const [response, setResponse] = React.useState("Give something to calculate!");
            return (
                <>
                    <Input
                        setResponse={setResponse}
                    />
                    <Response
                        response={response}
                    />
                </>
            );
        }

        const container = document.querySelector('.js-container');
        ReactDOM.createRoot(container).render(<App />);
    </script>
</body>

</html>
